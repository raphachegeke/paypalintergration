<!DOCTYPE html>
<html>
<head>
<title>Donate</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}

h2{
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="card">

<h2>Support Our Project ❤️</h2>
<p>Your donation helps us grow</p>

<input id="amount" type="number" placeholder="Enter donation amount">

<div id="paypal-button-container"></div>

</div>

<script src="https://www.paypal.com/sdk/js?client-id=YOUR_LIVE_CLIENT_ID&currency=USD"></script>

<script>

paypal.Buttons({

createOrder: async () => {

const amount = document.getElementById("amount").value || "5";

const res = await fetch("/create-donation",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({amount})
});

const data = await res.json();
return data.id;

},

onApprove: async (data) => {

const res = await fetch("/capture-donation",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({orderID:data.orderID})
});

await res.json();

alert("Thank you for your donation ❤️");

}

}).render('#paypal-button-container');

</script>

</body>
</html>
